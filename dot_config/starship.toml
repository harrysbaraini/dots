add_newline=false

format = """
$username\
$hostname\
$directory\
$direnv \
$git_branch\
$git_state\
$git_status\
$aws \
$cmd_duration\
$line_break\
$character"""

[direnv]
disabled = false
format = '[$loaded$allowed]($style) '
loaded_msg = 'direnv'
allowed_msg = ''
not_allowed_msg = 'direnv not allowed'

[directory]
style = "blue"

[character]
success_symbol = "[Óçå ](yellow)"
error_symbol = "[Óç™ ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
